<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>01A Theme Allocation Survey</title>
<style>
  :root {
    --ink: #1a1a2e;
    --muted: #6b7280;
    --line: #e5e7eb;
    --accent: #2563eb;
    --good: #16a34a;
    --bad: #dc2626;
    --bg: #f7f8fa;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    margin: 0;
    padding: 32px 16px 120px;
    line-height: 1.45;
  }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 24px; margin: 0 0 4px; }
  .sub { color: var(--muted); margin: 0 0 24px; font-size: 14px; }
  .name-row {
    background: #fff; border: 1px solid var(--line); border-radius: 12px;
    padding: 16px; margin-bottom: 20px;
  }
  .name-row label { font-weight: 600; font-size: 14px; display: block; margin-bottom: 6px; }
  .name-row input {
    width: 100%; padding: 10px 12px; font-size: 15px;
    border: 1px solid var(--line); border-radius: 8px;
  }
  .card {
    background: #fff; border: 1px solid var(--line); border-radius: 12px;
    overflow: hidden;
  }
  .item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; border-bottom: 1px solid var(--line);
  }
  .item:last-child { border-bottom: none; }
  .item .label { flex: 1; font-size: 14.5px; }
  .item input[type="number"] {
    width: 72px; padding: 8px 10px; font-size: 15px; text-align: center;
    border: 1px solid var(--line); border-radius: 8px;
  }
  .item input[type="number"]:focus { outline: 2px solid var(--accent); border-color: var(--accent); }
  .bar {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: #fff; border-top: 1px solid var(--line);
    padding: 14px 16px; display: flex; align-items: center; gap: 16px;
    justify-content: center; box-shadow: 0 -4px 16px rgba(0,0,0,.04);
  }
  .bar-inner { max-width: 720px; width: 100%; display: flex; align-items: center; gap: 16px; }
  .counter { font-size: 15px; font-weight: 600; flex: 1; }
  .counter .num { font-size: 20px; }
  .counter.good .num { color: var(--good); }
  .counter.bad .num { color: var(--bad); }
  button {
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 12px 20px; font-size: 15px; font-weight: 600; cursor: pointer;
  }
  button.secondary { background: #fff; color: var(--accent); border: 1px solid var(--accent); }
  .hint { font-size: 13px; color: var(--muted); margin-top: 10px; }
  .err { color: var(--bad); font-size: 13px; font-weight: 600; margin-top: 3px; min-height: 16px; }

  /* Results panel */
  .overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45);
    align-items: center; justify-content: center; padding: 16px; z-index: 10;
  }
  .overlay.show { display: flex; }
  .modal {
    background: #fff; border-radius: 14px; max-width: 560px; width: 100%;
    padding: 24px; box-shadow: 0 20px 60px rgba(0,0,0,.25);
  }
  .modal h2 { margin: 0 0 6px; font-size: 19px; }
  .modal p { color: var(--muted); font-size: 14px; margin: 0 0 14px; }
  .modal textarea {
    width: 100%; height: 200px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 13px; border: 1px solid var(--line); border-radius: 8px; padding: 12px; resize: vertical;
  }
  .modal-actions { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
  .copied { color: var(--good); font-weight: 600; font-size: 14px; align-self: center; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Theme Allocation Survey</h1>
  <p class="sub">You have <strong>50 points</strong>. Allocate them across the themes below however you like — concentrate them or spread them out. The running total must equal exactly 50 to submit.</p>

  <div class="name-row">
    <label for="who">Your name</label>
    <input id="who" type="text" placeholder="e.g. Adam" autocomplete="off">
  </div>

  <div class="card" id="card"></div>

  <p class="hint">Tip: leave a theme at 0 if you'd put no points there. <span style="opacity:.5">(v3 · auto-email)</span></p>
</div>

<div class="bar">
  <div class="bar-inner">
    <div style="flex:1">
      <div class="counter" id="counter"><span class="num">0</span> / 50 allocated &middot; <span id="remaining">50</span> remaining</div>
      <div class="err" id="err"></div>
    </div>
    <button id="submit">Submit</button>
  </div>
</div>

<!-- Status panel -->
<div class="overlay" id="overlay">
  <div class="modal" id="modalBody"></div>
</div>

<script>
  var THEMES = [
    "AI for Physical Infrastructure (Construction, Architecture)",
    "AI Enterprise Implementations + Deployment Services",
    "AI Software for Government",
    "Lifescience AI",
    "Robotics Software / Hardware",
    "Power",
    "Grid Modernization",
    "Next Gen EDA Tools",
    "American Open Source Models",
    "Future of Agentic Infrastructure / Deployments",
    "AI Code Generation / Testing",
    "Networking + Connectivity",
    "Consumer Social",
    "Gaming",
    "Developer Tooling – Data, Storage & Vector Databases",
    "AI in Healthcare"
  ];

  var SEND_TO = "maheedhar@01a.com";
  var card = document.getElementById("card");

  THEMES.forEach(function(t, i) {
    var row = document.createElement("div");
    row.className = "item";
    row.innerHTML =
      '<div class="label">' + t + '</div>' +
      '<input type="number" min="0" max="50" step="1" inputmode="numeric" placeholder="0" data-i="' + i + '">';
    card.appendChild(row);
  });

  var inputs = Array.prototype.slice.call(card.querySelectorAll("input"));
  var counterEl = document.getElementById("counter");
  var numEl = counterEl.querySelector(".num");
  var remainingEl = document.getElementById("remaining");
  var submitBtn = document.getElementById("submit");
  var errEl = document.getElementById("err");

  function total() {
    return inputs.reduce(function(sum, el) {
      var v = parseInt(el.value, 10);
      return sum + (isNaN(v) || v < 0 ? 0 : v);
    }, 0);
  }

  function update() {
    var t = total();
    numEl.textContent = t;
    remainingEl.textContent = (50 - t);
    counterEl.classList.toggle("good", t === 50);
    counterEl.classList.toggle("bad", t > 50);
    if (t <= 50) errEl.textContent = "";
  }

  inputs.forEach(function(el) { el.addEventListener("input", update); });

  // ---- Submit: auto-emails maheedhar@01a.com via FormSubmit (no account/key) ----
  var ENDPOINT = "https://formsubmit.co/ajax/" + SEND_TO;
  var overlay = document.getElementById("overlay");
  var modalBody = document.getElementById("modalBody");
  var lastBody = "", lastSubject = "";

  function showModal(html) {
    modalBody.innerHTML = html;
    overlay.classList.add("show");
  }
  function closeModal() { overlay.classList.remove("show"); }

  overlay.addEventListener("click", function(e) {
    if (e.target === overlay) closeModal();
  });

  submitBtn.addEventListener("click", function() {
    var who = (document.getElementById("who").value || "").trim();
    var t = total();

    if (!who) {
      errEl.textContent = "Please enter your name at the top.";
      document.getElementById("who").focus();
      return;
    }
    if (t !== 50) {
      errEl.textContent = "Your points add up to " + t + ". They must total exactly 50 (" +
        (t < 50 ? (50 - t) + " to add" : (t - 50) + " too many") + ").";
      return;
    }
    errEl.textContent = "";

    // Build the payload: one field per theme that got points, plus name + total.
    var fields = {
      "Name": who,
      "_subject": "Theme allocation – " + who,
      "_template": "table",
      "_captcha": "false"
    };
    var lines = [];
    inputs.forEach(function(el) {
      var v = parseInt(el.value, 10) || 0;
      if (v > 0) {
        var theme = THEMES[el.getAttribute("data-i")];
        fields[theme] = String(v);
        lines.push(theme + ": " + v);
      }
    });
    fields["TOTAL"] = "50";

    lastSubject = "Theme allocation – " + who;
    lastBody = "Name: " + who + "\n\nAllocation (50 points):\n\n" + lines.join("\n") + "\n";

    submitBtn.disabled = true;
    showModal('<h2>Sending…</h2><p>Submitting your allocation.</p>');

    fetch(ENDPOINT, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Accept": "application/json" },
      body: JSON.stringify(fields)
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      submitBtn.disabled = false;
      if (data && (data.success === "true" || data.success === true)) {
        showModal(
          '<h2>✅ Sent — thank you, ' + escapeHtml(who) + '!</h2>' +
          '<p>Your allocation has been emailed to Maheedhar. You can close this tab.</p>' +
          '<div class="modal-actions"><button id="closeBtn">Done</button></div>'
        );
      } else {
        showFallback();
      }
      wireClose();
    })
    .catch(function() {
      submitBtn.disabled = false;
      showFallback();
      wireClose();
    });
  });

  function showFallback() {
    showModal(
      '<h2>Couldn\'t auto-send</h2>' +
      '<p>No problem — copy the text below and send it to <strong>' + SEND_TO + '</strong>, ' +
      'or click <strong>Open email</strong>.</p>' +
      '<textarea id="result" readonly>' + escapeHtml(lastBody) + '</textarea>' +
      '<div class="modal-actions">' +
        '<button id="copyBtn">Copy results</button>' +
        '<button id="emailBtn" class="secondary">Open email</button>' +
        '<button id="closeBtn" class="secondary">Close</button>' +
        '<span class="copied" id="copied" style="display:none">Copied!</span>' +
      '</div>'
    );
    var copyBtn = document.getElementById("copyBtn");
    if (copyBtn) copyBtn.addEventListener("click", function() {
      var rb = document.getElementById("result");
      rb.select();
      try { document.execCommand("copy"); } catch (e) {}
      if (navigator.clipboard) navigator.clipboard.writeText(lastBody).catch(function(){});
      var c = document.getElementById("copied");
      if (c) { c.style.display = "inline"; setTimeout(function(){ c.style.display = "none"; }, 2000); }
    });
    var emailBtn = document.getElementById("emailBtn");
    if (emailBtn) emailBtn.addEventListener("click", function() {
      window.location.href = "mailto:" + SEND_TO +
        "?subject=" + encodeURIComponent(lastSubject) +
        "&body=" + encodeURIComponent(lastBody);
    });
  }

  function wireClose() {
    var b = document.getElementById("closeBtn");
    if (b) b.addEventListener("click", closeModal);
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"]/g, function(c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
    });
  }

  update();
</script>
</body>
</html>
